<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/avif" href="/favicon.avif" />
    <link rel="preconnect" href="https://avatars.githubusercontent.com" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Xtra Manager Software Community focuses on designing maintainable, real-world solutions. Open source, practical, and collaborative tools for developers and users." />
    <meta name="keywords" content="Xtra Manager, Open Source, Software, Android, Kotlin, Rust, Web Development, Community, Tools" />
    <meta name="author" content="Xtra Manager Team" />
    <meta name="theme-color" content="#19120d" />

    <title>Xtra Manager Software</title>
  </head>
  <body>
    <!-- Initial Splash Screen (Removed by Svelte onMount) -->
    <div id="splash-screen" style="position: fixed; inset: 0; z-index: 99999; background: #0f0a08; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: system-ui, sans-serif; transition: opacity 0.5s ease-out, visibility 0.5s ease-out;">
      <div style="font-weight: bold; font-size: 1.5rem; letter-spacing: -0.025em; margin-bottom: 2rem; color: #efe0d9;">
        <span style="color: #ffb784;">Xtra </span>ManagerSoftware
      </div>
      <div style="width: 3rem; height: 3rem; border: 4px solid rgba(255, 183, 132, 0.2); border-top-color: #ffb784; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Read Theme from LocalStorage immediately to avoid flash */
        @media (prefers-color-scheme: light) {
          :root { --init-bg: #fff8f5; --init-text: #221a15; --init-primary: #8d4f00; }
        }
        @media (prefers-color-scheme: dark) {
          :root { --init-bg: #0f0a08; --init-text: #efe0d9; --init-primary: #ffb784; }
        }
      </style>
      <script>
        (function() {
          const theme = localStorage.getItem('theme');
          const isLight = theme === 'light' || (!theme && window.matchMedia('(prefers-color-scheme: light)').matches);
          if (isLight) {
            document.documentElement.classList.add('light');
            const splash = document.getElementById('splash-screen');
            if (splash) {
              splash.style.background = '#fff8f5';
              splash.children[0].style.color = '#221a15';
              splash.children[0].children[0].style.color = '#8d4f00';
              splash.children[1].style.borderColor = 'rgba(141, 79, 0, 0.2)';
              splash.children[1].style.borderTopColor = '#8d4f00';
            }
          }
        })();
      </script>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
